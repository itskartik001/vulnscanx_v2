id: sqli-error-based
name: Error-Based SQL Injection
author: VulnScanX Team
severity: critical
description: Detects SQL injection by triggering database error messages
category: SQL Injection
cwe: CWE-89
owasp: A03:2025
cvss: 9.0
tags:
  - sqli
  - injection
  - error-based

payloads:
  - "'"
  - "''"
  - "' OR '1'='1"
  - "' OR '1'='1'--"
  - "1' ORDER BY 1--"
  - "1 UNION SELECT NULL--"
  - "\" OR 1=1--"

match:
  type: regex_any
  values:
    - "you have an error in your sql syntax"
    - "warning: mysql"
    - "unclosed quotation mark"
    - "quoted string not properly terminated"
    - "ora-\\d{5}"
    - "microsoft sql server"
    - "psycopg2\\.operationalerror"

remediation: |
  1. Use parameterized queries or prepared statements exclusively.
  2. Never concatenate user input directly into SQL strings.
  3. Apply principle of least privilege to database accounts.
  4. Use stored procedures where possible.
  5. Implement a Web Application Firewall as defense-in-depth.
  6. Enable database query logging and alerting.

references:
  - https://owasp.org/www-community/attacks/SQL_Injection
  - https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html
