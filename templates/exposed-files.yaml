id: exposed-git-repository
name: Exposed .git Directory
description: |
  Detects publicly accessible .git directories. This allows attackers to
  reconstruct the entire source code including historical commits, potentially
  exposing hardcoded credentials, business logic, and internal architecture.
severity: critical
cvss_score: 9.3
author: vulnscanx
tags:
  - exposure
  - misconfiguration
  - git
  - source-code
  - owasp-a02

requests:
  - method: GET
    path: /.git/HEAD
    matchers:
      - type: word
        words:
          - "ref: refs/"
          - "HEAD"
        part: body
        condition: or
      - type: status
        values: ["200"]

remediation: |
  1. Immediately block access to .git/ at the web server level.
  2. Rotate any credentials committed in git history (use git-secrets, trufflehog).
  3. Nginx: location ~ /\.git { deny all; return 404; }
  4. Apache: RedirectMatch 404 /\.git
references:
  - https://owasp.org/www-project-web-security-testing-guide/

