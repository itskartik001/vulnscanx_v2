id: exposed-env-file
name: Exposed .env Configuration File
description: |
  Checks for publicly accessible .env files which typically contain database
  credentials, API keys, secret tokens, and other sensitive configuration.
  This is a critical misconfiguration that allows instant credential theft.
severity: critical
cvss_score: 9.8
author: vulnscanx
tags:
  - exposure
  - misconfiguration
  - owasp-a02
  - credentials
  - cwe-200

requests:
  - method: GET
    path: /.env
    matchers:
      - type: word
        words:
          - "DB_PASSWORD"
          - "APP_KEY"
          - "SECRET_KEY"
          - "DATABASE_URL"
          - "AWS_SECRET"
          - "API_KEY"
          - "PRIVATE_KEY"
        part: body
        condition: or
      - type: status
        values: ["200"]
    stop_at_first_match: true

remediation: |
  IMMEDIATE ACTION REQUIRED:
  1. Take the .env file offline immediately.
  2. Rotate ALL credentials and API keys exposed in the file.
  3. Add .env to your .gitignore and web server deny rules.
  4. In Apache: Add "Deny from all" in .htaccess for .env files.
  5. In Nginx: Add "location ~ /\.env { deny all; return 404; }".
references:
  - https://owasp.org/www-project-web-security-testing-guide/
  - https://cwe.mitre.org/data/definitions/200.html

