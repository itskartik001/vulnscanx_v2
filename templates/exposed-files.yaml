id: exposed-phpinfo
name: PHP Info Page Exposed
description: |
  A phpinfo() output page is publicly accessible. This reveals the PHP version,
  loaded extensions, configuration settings, environment variables, and server
  paths — all valuable reconnaissance information for an attacker.
severity: medium
cvss_score: 5.3
author: vulnscanx
tags:
  - exposure
  - phpinfo
  - information-disclosure
  - owasp-a02

requests:
  - method: GET
    path: /phpinfo.php
    matchers:
      - type: word
        words:
          - "PHP Version"
          - "phpinfo()"
        part: body
        condition: or
      - type: status
        values: ["200"]

  - method: GET
    path: /info.php
    matchers:
      - type: word
        words:
          - "PHP Version"
          - "phpinfo()"
        part: body
        condition: or

remediation: |
  1. Remove all phpinfo() pages from production servers.
  2. Restrict access to admin/diagnostic pages via IP whitelist.
  3. Disable phpinfo() in php.ini: disable_functions = phpinfo

