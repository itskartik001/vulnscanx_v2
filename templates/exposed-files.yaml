id: cors-wildcard-misconfiguration
name: CORS Wildcard Origin
description: |
  The server returns Access-Control-Allow-Origin: * which permits any
  website to make cross-origin requests to this endpoint. Combined with
  cookies or auth headers this can lead to CSRF and data theft.
severity: high
cvss_score: 7.5
author: vulnscanx
tags:
  - cors
  - misconfiguration
  - owasp-a02

requests:
  - method: GET
    path: /
    headers:
      Origin: "https://evil.vulnscanx.test"
    matchers:
      - type: word
        words:
          - "access-control-allow-origin: *"
        part: headers
        condition: or

remediation: |
  1. Replace wildcard CORS with explicit origin allowlist.
  2. Never combine Access-Control-Allow-Origin: * with credentials mode.
  3. Implement proper CORS validation on the server side.
references:
  - https://developer.mozilla.org/en-US/docs/Web/HTTP/CORS
  - https://portswigger.net/web-security/cors
