services:
  - type: web
    name: vulnscanx
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python web/app.py
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
      - key: FLASK_ENV
        value: production
    healthCheckPath: /api/health
