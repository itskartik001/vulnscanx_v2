name: VulnScanX CI Pipeline
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with: {python-version: '3.11'}
      - run: pip install flake8 bandit
      - run: flake8 . --count --select=E9,F63,F7,F82 --show-source
      - run: bandit -r . -x ./tests -ll

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with: {python-version: '3.11'}
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -v --tb=short

  security-scan:
    name: SARIF Security Report
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with: {python-version: '3.11'}
      - run: pip install -r requirements.txt
      - name: Run Quick Scan
        run: |
          python -c "
          import sys; sys.path.insert(0,'.')
          from core.config import ScanConfig
          from core.engine import VulnScanEngine
          from reports.report_manager import ReportManager
          config = ScanConfig(target='http://testphp.vulnweb.com',
                              scan_type='quick', ai_analysis=False, modules=['headers'])
          engine = VulnScanEngine(config)
          engine.load_default_modules()
          result = engine.run()
          ReportManager(['sarif']).generate_all(result)
          "
      - uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: reports/output/
