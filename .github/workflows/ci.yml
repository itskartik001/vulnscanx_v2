name: VulnScanX CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install lint tools
        run: pip install flake8
      - name: Run flake8 (syntax errors only)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv,.venv,__pycache__,build,dist
        continue-on-error: true

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install pytest pyyaml requests flask flask-cors numpy scikit-learn dnspython python-whois
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
        continue-on-error: true

  deploy-check:
    name: Deploy Ready Check
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Check all imports
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from core.config import ScanConfig, VERSION
          from core.models import Finding, ScanResult
          from core.engine import VulnScanEngine, BaseModule
          from reports.report_manager import ReportManager
          from ai.classifier import VulnClassifier
          print(f'VulnScanX v{VERSION} — all imports OK')
          "
      - name: Done
        run: echo "Ready for deployment on Render"
